<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/projects.css">
    <title>Supermyskin - Projects</title>
</head>

<body>

    <canvas id="rain"></canvas>

    <div class="page">

        <div class="breadcrumb">
            <a href="#">~/</a><span>›</span>projects
        </div>

        <div class="prompt-header">
            <div class="prompt-row">
                <span class="p-sym">┌──(</span><span class="p-user">damian</span><span class="p-at">@</span><span
                    class="p-host">supermyskin</span><span class="p-sym">)-[</span><span
                    class="p-path">~/projects</span><span class="p-sym">]</span>
            </div>
            <div class="prompt-row">
                <span class="p-sym">└─$ </span><span class="p-cmd">ls</span> <span class="p-arg">-la
                    --color=mono</span>
            </div>
            <div class="p-out">total 0 entries &nbsp;·&nbsp; sorted by date modified</div>
        </div>

        <hr class="divider">

        <div class="back-row">
            <a class="back-link" href="../index.html">← cd ~/</a>
        </div>

    </div>

    <script src="../js/projects.js"></script>

</body>

</html>
